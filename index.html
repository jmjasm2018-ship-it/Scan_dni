<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador e Historial DNI - Exportación Excel</title>
  <!-- Tailwind CSS para los estilos UI -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Librería SheetJS para exportar a Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen p-4 md:p-8">

  <div class="max-w-4xl mx-auto space-y-6">
    
    <!-- Encabezado -->
    <header class="text-center md:text-left border-b border-slate-200 pb-4">
      <h1 class="text-2xl md:text-3xl font-bold text-slate-900">Gestor y Registro por DNI</h1>
      <p class="text-slate-500 text-sm mt-1">Busca, registra y exporta datos de ciudadanos a un archivo de Excel.</p>
    </header>

    <!-- Formulario de Registro / Búsqueda externa -->
    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
      <h2 class="text-lg font-semibold mb-3 text-slate-800">1. Registrar nueva persona</h2>
      <form id="dniForm" class="grid grid-cols-1 md:grid-cols-4 gap-3">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">DNI</label>
          <input type="text" id="dniInput" maxlength="8" placeholder="Ingresa DNI (8 dígitos)" required 
            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
            pattern="[0-9]{8}" title="Debe contener exactamente 8 números.">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Nombres</label>
          <input type="text" id="nombreInput" placeholder="Nombres" required 
            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Apellidos</label>
          <input type="text" id="apellidoInput" placeholder="Apellidos" required 
            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>
        <div class="flex items-end">
          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition text-sm flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            Agregar
          </button>
        </div>
      </form>
    </div>

    <!-- Lista y Filtros -->
    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 space-y-4">
      
      <div class="flex flex-col md:flex-row justify-between items-center gap-3">
        <div>
          <h2 class="text-lg font-semibold text-slate-800">2. Registros agregados</h2>
          <p class="text-xs text-slate-500" id="totalCount">Total: 0 registros</p>
        </div>

        <div class="flex items-center gap-2 w-full md:w-auto">
          <!-- Input para filtrar en vivo la lista -->
          <input type="text" id="searchFilter" placeholder="Buscar por DNI o Nombre..." 
            class="w-full md:w-64 px-3 py-1.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
          
          <!-- Botón Exportar a Excel -->
          <button id="exportBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-1.5 px-4 rounded-lg transition text-sm flex items-center gap-2 shrink-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            Exportar Excel
          </button>
        </div>
      </div>

      <!-- Tabla de Datos -->
      <div class="overflow-x-auto border border-slate-200 rounded-lg">
        <table class="w-full text-left text-sm text-slate-600">
          <thead class="bg-slate-50 text-slate-700 border-b border-slate-200">
            <tr>
              <th class="p-3 font-semibold">N°</th>
              <th class="p-3 font-semibold">DNI</th>
              <th class="p-3 font-semibold">Nombres</th>
              <th class="p-3 font-semibold">Apellidos</th>
              <th class="p-3 font-semibold">Fecha Registro</th>
              <th class="p-3 font-semibold text-center">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaResultados" class="divide-y divide-slate-100">
            <!-- Los registros se generan dinámicamente -->
          </tbody>
        </table>
      </div>

    </div>

  </div>

  <script>
    // Arreglo principal para guardar en memoria
    let baseDatos = [
      { dni: "12345678", nombres: "Juan Carlos", apellidos: "Pérez Gómez", fecha: "2026-07-20" },
      { dni: "87654321", nombres: "Maria Luisa", apellidos: "Torres Rojas", fecha: "2026-07-21" }
    ];

    const dniForm = document.getElementById('dniForm');
    const tablaResultados = document.getElementById('tablaResultados');
    const searchFilter = document.getElementById('searchFilter');
    const exportBtn = document.getElementById('exportBtn');
    const totalCount = document.getElementById('totalCount');

    // Cargar tabla inicial
    document.addEventListener('DOMContentLoaded', () => {
      renderTabla(baseDatos);
    });

    // Renderizar registros en la tabla
    function renderTabla(datos) {
      tablaResultados.innerHTML = '';
      totalCount.textContent = `Total: ${datos.length} registros`;

      if (datos.length === 0) {
        tablaResultados.innerHTML = `
          <tr>
            <td colspan="6" class="p-4 text-center text-slate-400">No se encontraron registros.</td>
          </tr>`;
        return;
      }

      datos.forEach((item, index) => {
        const row = document.createElement('tr');
        row.className = "hover:bg-slate-50 transition";
        row.innerHTML = `
          <td class="p-3 font-mono text-xs text-slate-400">${index + 1}</td>
          <td class="p-3 font-mono font-medium text-slate-800">${item.dni}</td>
          <td class="p-3">${item.nombres}</td>
          <td class="p-3">${item.apellidos}</td>
          <td class="p-3 text-xs text-slate-500">${item.fecha}</td>
          <td class="p-3 text-center">
            <button onclick="eliminarRegistro('${item.dni}')" class="text-red-500 hover:text-red-700 text-xs font-medium">Eliminar</button>
          </td>
        `;
        tablaResultados.appendChild(row);
      });
    }

    // Agregar registro
    dniForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const dni = document.getElementById('dniInput').value.trim();
      const nombres = document.getElementById('nombreInput').value.trim();
      const apellidos = document.getElementById('apellidoInput').value.trim();

      // Validar duplicado
      if (baseDatos.some(p => p.dni === dni)) {
        alert("El DNI ingresado ya existe en la lista.");
        return;
      }

      const nuevoRegistro = {
        dni: dni,
        nombres: nombres,
        apellidos: apellidos,
        fecha: new Date().toISOString().split('T')[0]
      };

      baseDatos.push(nuevoRegistro);
      renderTabla(baseDatos);
      dniForm.reset();
    });

    // Eliminar registro por DNI
    function eliminarRegistro(dni) {
      baseDatos = baseDatos.filter(p => p.dni !== dni);
      renderTabla(obtenerDatosFiltrados());
    }

    // Filtrar en tiempo real mediante el campo de búsqueda
    searchFilter.addEventListener('input', () => {
      renderTabla(obtenerDatosFiltrados());
    });

    function obtenerDatosFiltrados() {
      const query = searchFilter.value.toLowerCase().trim();
      return baseDatos.filter(p => 
        p.dni.toLowerCase().includes(query) ||
        p.nombres.toLowerCase().includes(query) ||
        p.apellidos.toLowerCase().includes(query)
      );
    }

    // Exportar la lista filtrada o completa a un archivo de Excel (.xlsx)
    exportBtn.addEventListener('click', () => {
      const datosAExportar = obtenerDatosFiltrados();

      if (datosAExportar.length === 0) {
        alert("No hay registros para exportar.");
        return;
      }

      // Estructurar los campos para la hoja de Excel
      const excelData = datosAExportar.map((item, index) => ({
        "N°": index + 1,
        "DNI": item.dni,
        "Nombres": item.nombres,
        "Apellidos": item.apellidos,
        "Fecha de Registro": item.fecha
      }));

      // Crear la hoja de trabajo con SheetJS
      const worksheet = XLSX.utils.json_to_sheet(excelData);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "Lista DNI");

      // Descargar el archivo
      XLSX.writeFile(workbook, `Registro_DNI_${new Date().toISOString().split('T')[0]}.xlsx`);
    });
  </script>
</body>
</html>
