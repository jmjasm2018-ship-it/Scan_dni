<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Captura de DNI & OCR Avanzado</title>
  
  <!-- Estilos UI -->
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent: #38bdf8;
      --accent-hover: #0284c7;
      --text: #f8fafc;
      --text-dim: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background-color: var(--bg-color); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

    header { text-align: center; margin-bottom: 24px; }
    header h1 { font-size: 1.8rem; color: var(--accent); }
    header p { color: var(--text-dim); font-size: 0.9rem; margin-top: 4px; }

    .main-container { display: grid; grid-template-columns: 1fr; gap: 20px; width: 100%; max-width: 900px; }
    @media (min-width: 768px) { .main-container { grid-template-columns: 1fr 1fr; } }

    .card { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid #334155; }
    .card h2 { font-size: 1.2rem; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }

    /* Visor de Cámara */
    .camera-wrapper { position: relative; width: 100%; height: 260px; background: #000; border-radius: 8px; overflow: hidden; display: flex; justify-content: center; align-items: center; }
    video, canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; }
    
    /* Guía visual para encuadre del DNI */
    .overlay-guide {
      position: absolute; width: 85%; height: 70%; border: 2px dashed var(--accent);
      border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
      pointer-events: none; display: flex; align-items: flex-start; justify-content: flex-end; padding: 8px;
    }
    .overlay-guide span { background: rgba(56, 189, 248, 0.2); color: var(--accent); font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }

    .controls { display: flex; gap: 10px; margin-top: 16px; }
    button {
      flex: 1; padding: 12px; border: none; border-radius: 8px; background: var(--accent);
      color: #000; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: var(--accent-hover); color: #fff; }
    button.btn-export { background: #10b981; color: #fff; }
    button.btn-export:hover { background: #059669; }

    /* Estado e Indicadores */
    .status-badge { font-size: 0.8rem; padding: 4px 8px; border-radius: 4px; background: #334155; color: var(--accent); }
    
    /* Lista de Capturas */
    .table-container { overflow-x: auto; max-height: 300px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #334155; }
    th { background: #0f172a; color: var(--accent); }
    tr:hover { background: rgba(255, 255, 255, 0.02); }

    .hidden { display: none; }
  </style>

  <!-- Librerías Externas para Tratamiento Digital de Imágenes, OCR y Excel -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

  <header>
    <h1>Escáner & OCR de DNI</h1>
    <p>Optimizado para lecturas con baja iluminación y documentos desgastados</p>
  </header>

  <div class="main-container">
    <!-- Sección de Cámara y Procesamiento -->
    <div class="card">
      <h2>Captura <span id="status" class="status-badge">Inicializando...</span></h2>
      <div class="camera-wrapper">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="processedCanvas" class="hidden"></canvas>
        <div class="overlay-guide"><span>Alinee el DNI aquí</span></div>
      </div>
      
      <div class="controls">
        <button id="btnCapture" onclick="processAndScan()">Tomar Foto & Capturar</button>
      </div>
    </div>

    <!-- Sección de Resultados y Exportación -->
    <div class="card">
      <h2>
        Registros Capturados
        <span id="counter" class="status-badge">0 registros</span>
      </h2>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Apellidos</th>
              <th>Nombres</th>
              <th>F. Nacimiento</th>
            </tr>
          </thead>
          <tbody id="dataTable">
            <!-- Filas dinámicas -->
          </tbody>
        </table>
      </div>
      <div class="controls" style="margin-top: 16px;">
        <button class="btn-export" onclick="exportToExcel()">Exportar a Excel (.xlsx)</button>
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('processedCanvas');
    const ctx = canvas.getContext('2d');
    const statusTag = document.getElementById('status');
    const dataTable = document.getElementById('dataTable');
    const counterTag = document.getElementById('counter');

    let capturedRecords = [];
    let worker = null;

    // 1. Inicialización de Cámara y Motor Tesseract OCR
    async function initApp() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        video.srcObject = stream;

        statusTag.innerText = "Cargando Motor OCR...";
        worker = await Tesseract.createWorker('spa');
        statusTag.innerText = "Listo";
      } catch (err) {
        statusTag.innerText = "Error de Acceso";
        alert("Error al acceder a la cámara o cargar la librería OCR: " + err);
      }
    }

    // 2. Filtrado Adaptativo de Imagen (Baja Luz y Desgaste)
    function applyAdaptivePreprocessing(srcCanvas, ctx) {
      const imgData = ctx.getImageData(0, 0, srcCanvas.width, srcCanvas.height);
      const data = imgData.data;

      // Paso A: Convertir a Escala de Grises e Incrementar Contraste
      for (let i = 0; i < data.length; i += 4) {
        // Luminancia relativa
        let gray = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
        
        // Aumento de contraste (Ajuste de curva Sigmoide simplificada)
        gray = (gray - 128) * 1.5 + 128;
        gray = Math.min(255, Math.max(0, gray));

        data[i] = gray;     // R
        data[i + 1] = gray; // G
        data[i + 2] = gray; // B
      }

      // Paso B: Binarización u Thresholding Otsu simplificado (Elimina sombras)
      let sum = 0;
      for (let i = 0; i < data.length; i += 4) sum += data[i];
      let avgThreshold = sum / (data.length / 4);

      for (let i = 0; i < data.length; i += 4) {
        let val = data[i] > (avgThreshold * 0.9) ? 255 : 0; // Umbralización para resaltar texto negro
        data[i] = val;
        data[i + 1] = val;
        data[i + 2] = val;
      }

      ctx.putImageData(imgData, 0, 0);
    }

    // 3. Captura y Extracción de Texto
    async function processAndScan() {
      if (!worker) return;

      statusTag.innerText = "Procesando...";
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      // Aplicar filtros de imagen para entornos oscuros o con texto desgastado
      applyAdaptivePreprocessing(canvas, ctx);

      // Realizar OCR sobre la imagen optimizada
      const { data: { text } } = await worker.recognize(canvas);
      
      // Parsear datos mediante Expresiones Regulares (RegEx) adaptadas a patrones de DNI
      const parsedData = parseDNIText(text);

      if (parsedData.apellidos || parsedData.nombres || parsedData.fechaNacimiento) {
        capturedRecords.push(parsedData);
        updateTable();
        statusTag.innerText = "Capturado";
      } else {
        statusTag.innerText = "Sin coincidencias";
        alert("No se lograron identificar los patrones de texto. Asegúrese de centrar bien el documento e iluminar el área.");
      }
    }

    // 4. Extracción por Patrones Regex (Soporta múltiples formatos de DNI)
    function parseDNIText(rawText) {
      const cleanText = rawText.toUpperCase();

      // Patrones de fecha común (DD/MM/AAAA, DD-MM-AAAA, DD.MM.AAAA)
      const dateRegex = /\b(0[1-9]|[12][0-9]|3[01])[\/\.-](0[1-9]|1[012])[\/\.-](19|20)\d\d\b/;
      const dateMatch = cleanText.match(dateRegex);

      // Extracción de líneas para buscar campos por etiquetas de texto usuales
      const lines = cleanText.split('\n').map(l => l.trim()).filter(l => l.length > 0);

      let apellidos = "";
      let nombres = "";

      for (let i = 0; i < lines.length; i++) {
        if (lines[i].includes("APELLIDO") || lines[i].includes("SURNAME")) {
          apellidos = lines[i + 1] || lines[i];
        }
        if (lines[i].includes("NOMBRE") || lines[i].includes("GIVEN")) {
          nombres = lines[i + 1] || lines[i];
        }
      }

      // Si las etiquetas no se encuentran directamente debido al deterioro del plástico:
      if (!apellidos && lines.length > 0) apellidos = lines[0].replace(/[^A-Z\s]/g, '');
      if (!nombres && lines.length > 1) nombres = lines[1].replace(/[^A-Z\s]/g, '');

      return {
        apellidos: apellidos.replace(/(APELLIDOS|SURNAME|PRIMER|SEGUNDO)/g, '').trim(),
        nombres: nombres.replace(/(NOMBRES|GIVEN|NAME)/g, '').trim(),
        fechaNacimiento: dateMatch ? dateMatch[0] : "No detectada"
      };
    }

    // 5. Renderizado en Tabla
    function updateTable() {
      dataTable.innerHTML = "";
      capturedRecords.forEach(rec => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${rec.apellidos || '—'}</td>
          <td>${rec.nombres || '—'}</td>
          <td>${rec.fechaNacimiento || '—'}</td>
        `;
        dataTable.appendChild(row);
      });
      counterTag.innerText = `${capturedRecords.length} registros`;
    }

    // 6. Exportación a Excel (.xlsx)
    function exportToExcel() {
      if (capturedRecords.length === 0) {
        alert("No hay registros para exportar.");
        return;
      }

      // Formatear la estructura para SheetJS
      const dataToExport = capturedRecords.map(item => ({
        "Apellidos": item.apellidos,
        "Nombres": item.nombres,
        "Fecha de Nacimiento": item.fechaNacimiento
      }));

      const worksheet = XLSX.utils.json_to_sheet(dataToExport);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "Registros_DNI");

      // Descarga del archivo generado
      XLSX.writeFile(workbook, `Lecturas_DNI_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    // Ejecutar inicialización al cargar la ventana
    window.addEventListener('load', initApp);
  </script>
</body>
</html>
