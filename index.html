<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador DNI RENIEC - Exportación Excel</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Librería SheetJS para exportar a Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen p-4 md:p-8">

  <div class="max-w-4xl mx-auto space-y-6">
    
    <!-- Encabezado -->
    <header class="text-center md:text-left border-b border-slate-200 pb-4">
      <h1 class="text-2xl md:text-3xl font-bold text-slate-900">Consulta DNI - RENIEC</h1>
      <p class="text-slate-500 text-sm mt-1">Busca un DNI, autocompleta los datos desde RENIEC y expórtalos a Excel.</p>
    </header>

    <!-- Formulario de Consulta DNI -->
    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
      <h2 class="text-lg font-semibold mb-3 text-slate-800">1. Consultar Persona</h2>
      
      <form id="dniForm" class="grid grid-cols-1 md:grid-cols-4 gap-3">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">DNI (8 dígitos)</label>
          <div class="flex gap-1">
            <input type="text" id="dniInput" maxlength="8" placeholder="Ej: 12345678" required 
              class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-mono"
              pattern="[0-9]{8}">
            <button type="button" id="btnBuscarDni" class="bg-slate-800 hover:bg-slate-900 text-white px-3 py-2 rounded-lg text-xs font-semibold transition flex items-center gap-1 shrink-0">
              <span id="btnText">Buscar</span>
              <div id="loader" class="hidden w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Nombres</label>
          <input type="text" id="nombreInput" placeholder="Nombre(s)" required readonly
            class="w-full px-3 py-2 border border-slate-200 bg-slate-50 rounded-lg text-sm text-slate-600">
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Apellidos</label>
          <input type="text" id="apellidoInput" placeholder="Apellidos" required readonly
            class="w-full px-3 py-2 border border-slate-200 bg-slate-50 rounded-lg text-sm text-slate-600">
        </div>

        <div class="flex items-end">
          <button type="submit" id="btnAgregar" disabled class="w-full bg-blue-600 disabled:bg-slate-300 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition text-sm flex items-center justify-center gap-2">
            Guardar en Lista
          </button>
        </div>
      </form>
      <p id="msgError" class="text-xs text-red-500 mt-2 hidden"></p>
    </div>

    <!-- Lista y Filtros -->
    <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 space-y-4">
      
      <div class="flex flex-col md:flex-row justify-between items-center gap-3">
        <div>
          <h2 class="text-lg font-semibold text-slate-800">2. Lista de Registros</h2>
          <p class="text-xs text-slate-500" id="totalCount">Total: 0 registros</p>
        </div>

        <div class="flex items-center gap-2 w-full md:w-auto">
          <input type="text" id="searchFilter" placeholder="Filtrar por DNI o Nombre..." 
            class="w-full md:w-64 px-3 py-1.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
          
          <button id="exportBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-1.5 px-4 rounded-lg transition text-sm flex items-center gap-2 shrink-0">
            Exportar Excel
          </button>
        </div>
      </div>

      <!-- Tabla de Datos -->
      <div class="overflow-x-auto border border-slate-200 rounded-lg">
        <table class="w-full text-left text-sm text-slate-600">
          <thead class="bg-slate-50 text-slate-700 border-b border-slate-200">
            <tr>
              <th class="p-3 font-semibold">N°</th>
              <th class="p-3 font-semibold">DNI</th>
              <th class="p-3 font-semibold">Nombres</th>
              <th class="p-3 font-semibold">Apellidos</th>
              <th class="p-3 font-semibold">Fecha Registro</th>
              <th class="p-3 font-semibold text-center">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaResultados" class="divide-y divide-slate-100">
            <!-- Registros -->
          </tbody>
        </table>
      </div>

    </div>

  </div>

  <script>
    let baseDatos = [];

    const dniInput = document.getElementById('dniInput');
    const nombreInput = document.getElementById('nombreInput');
    const apellidoInput = document.getElementById('apellidoInput');
    const btnBuscarDni = document.getElementById('btnBuscarDni');
    const btnAgregar = document.getElementById('btnAgregar');
    const msgError = document.getElementById('msgError');
    const btnText = document.getElementById('btnText');
    const loader = document.getElementById('loader');

    const dniForm = document.getElementById('dniForm');
    const tablaResultados = document.getElementById('tablaResultados');
    const searchFilter = document.getElementById('searchFilter');
    const exportBtn = document.getElementById('exportBtn');
    const totalCount = document.getElementById('totalCount');

    // CONFIGURACIÓN DE TU TOKEN API (Ejemplo con apisperu.com, netpe, etc.)
    // Puedes reemplazar la URL por tu propio endpoint o proveedor API
    const API_TOKEN = ""; // <--- Si tu proveedor te da un Bearer Token, ponlo aquí

    // 1. Buscar DNI en la API de RENIEC
    async function consultarDNI() {
      const dni = dniInput.value.trim();
      
      if (dni.length !== 8 || isNaN(dni)) {
        mostrarError("El DNI debe contener 8 dígitos numéricos.");
        return;
      }

      limpiarMensaje();
      toggleLoading(true);

      try {
        // Ejemplo utilizando una API pública (puedes reemplazar por la URL de tu API preferida)
        const response = await fetch(`https://api.apis.net.pe/v1/dni?numero=${dni}`);

        if (!response.ok) {
          throw new Error("No se encontraron datos o hubo un fallo en el servidor.");
        }

        const data = await response.json();

        // Mapear nombres y apellidos según la respuesta del servicio
        nombreInput.value = data.nombres || "";
        apellidoInput.value = `${data.apellidoPaterno || ''} ${data.apellidoMaterno || ''}`.trim();

        btnAgregar.disabled = false;
      } catch (error) {
        mostrarError("No se pudo obtener la información del DNI. Verifica el número o ingresa manualmente.");
        nombreInput.readOnly = false;
        apellidoInput.readOnly = false;
        btnAgregar.disabled = false;
      } finally {
        toggleLoading(false);
      }
    }

    btnBuscarDni.addEventListener('click', consultarDNI);

    dniInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        consultarDNI();
      }
    });

    // 2. Guardar persona en la tabla local
    dniForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const dni = dniInput.value.trim();
      const nombres = nombreInput.value.trim();
      const apellidos = apellidoInput.value.trim();

      if (baseDatos.some(p => p.dni === dni)) {
        mostrarError("Este DNI ya está agregado a la lista.");
        return;
      }

      baseDatos.push({
        dni,
        nombres,
        apellidos,
        fecha: new Date().toISOString().split('T')[0]
      });

      renderTabla(baseDatos);

      // Resetear campos
      dniForm.reset();
      nombreInput.readOnly = true;
      apellidoInput.readOnly = true;
      btnAgregar.disabled = true;
      limpiarMensaje();
    });

    // Renderizar la tabla de resultados
    function renderTabla(datos) {
      tablaResultados.innerHTML = '';
      totalCount.textContent = `Total: ${datos.length} registros`;

      if (datos.length === 0) {
        tablaResultados.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-slate-400">No hay registros guardados.</td></tr>`;
        return;
      }

      datos.forEach((item, index) => {
        const row = document.createElement('tr');
        row.className = "hover:bg-slate-50 transition";
        row.innerHTML = `
          <td class="p-3 font-mono text-xs text-slate-400">${index + 1}</td>
          <td class="p-3 font-mono font-medium text-slate-800">${item.dni}</td>
          <td class="p-3">${item.nombres}</td>
          <td class="p-3">${item.apellidos}</td>
          <td class="p-3 text-xs text-slate-500">${item.fecha}</td>
          <td class="p-3 text-center">
            <button onclick="eliminarRegistro('${item.dni}')" class="text-red-500 hover:text-red-700 text-xs font-medium">Eliminar</button>
          </td>
        `;
        tablaResultados.appendChild(row);
      });
    }

    function eliminarRegistro(dni) {
      baseDatos = baseDatos.filter(p => p.dni !== dni);
      renderTabla(obtenerDatosFiltrados());
    }

    // Filtrar tabla por texto
    searchFilter.addEventListener('input', () => renderTabla(obtenerDatosFiltrados()));

    function obtenerDatosFiltrados() {
      const q = searchFilter.value.toLowerCase().trim();
      return baseDatos.filter(p => 
        p.dni.toLowerCase().includes(q) || 
        p.nombres.toLowerCase().includes(q) || 
        p.apellidos.toLowerCase().includes(q)
      );
    }

    // Exportar a Excel
    exportBtn.addEventListener('click', () => {
      const datos = obtenerDatosFiltrados();
      if (datos.length === 0) return alert("No hay datos para exportar.");

      const excelData = datos.map((item, i) => ({
        "N°": i + 1,
        "DNI": item.dni,
        "Nombres": item.nombres,
        "Apellidos": item.apellidos,
        "Fecha Registro": item.fecha
      }));

      const ws = XLSX.utils.json_to_sheet(excelData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "DNI RENIEC");
      XLSX.writeFile(wb, `Consulta_RENIEC_${new Date().toISOString().split('T')[0]}.xlsx`);
    });

    // Funciones Auxiliares UI
    function toggleLoading(isLoading) {
      if (isLoading) {
        loader.classList.remove('hidden');
        btnText.textContent = "...";
        btnBuscarDni.disabled = true;
      } else {
        loader.classList.add('hidden');
        btnText.textContent = "Buscar";
        btnBuscarDni.disabled = false;
      }
    }

    function mostrarError(mensaje) {
      msgError.textContent = mensaje;
      msgError.classList.remove('hidden');
    }

    function limpiarMensaje() {
      msgError.textContent = "";
      msgError.classList.add('hidden');
    }
  </script>
</body>
</html>
