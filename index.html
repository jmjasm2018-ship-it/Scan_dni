<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador DNI RENIEC - Exportador a Excel</title>
  <!-- Tailwind CSS para diseño moderno -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Librería SheetJS para exportar a Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen p-4 md:p-8">

  <div class="max-w-4xl mx-auto space-y-6">
    
    <!-- Encabezado -->
    <header class="bg-blue-700 text-white p-6 rounded-xl shadow-md">
      <h1 class="text-2xl md:text-3xl font-bold">Consulta DNI - RENIEC</h1>
      <p class="text-blue-100 text-sm mt-1">Busca ciudadanos por DNI, consulta sus nombres en tiempo real y exporta la lista a Excel.</p>
    </header>

    <!-- Formulario de Consulta DNI -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
      <h2 class="text-lg font-semibold mb-4 text-slate-800 border-b border-slate-100 pb-2">1. Consultar Persona</h2>
      
      <form id="dniForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div>
          <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1">DNI (8 dígitos)</label>
          <div class="flex gap-2">
            <input type="text" id="dniInput" maxlength="8" placeholder="Ej. 12345678" required 
              class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-mono"
              pattern="[0-9]{8}" title="Ingresa 8 números">
            
            <button type="button" id="btnBuscarDni" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg text-xs font-semibold transition flex items-center justify-center gap-2 shrink-0">
              <span id="btnText">Buscar</span>
              <div id="loader" class="hidden w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1">Nombres</label>
          <input type="text" id="nombreInput" placeholder="Nombres" required readonly
            class="w-full px-3 py-2 border border-slate-200 bg-slate-50 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1">Apellidos</label>
          <input type="text" id="apellidoInput" placeholder="Apellidos" required readonly
            class="w-full px-3 py-2 border border-slate-200 bg-slate-50 rounded-lg text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="flex items-end">
          <button type="submit" id="btnAgregar" disabled class="w-full bg-blue-600 disabled:bg-slate-300 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition text-sm flex items-center justify-center gap-2">
            + Agregar a Lista
          </button>
        </div>
      </form>

      <!-- Mensajes de Estado / Alertas -->
      <div id="statusAlert" class="mt-3 p-3 rounded-lg text-xs font-medium hidden"></div>
    </div>

    <!-- Lista y Filtros -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 space-y-4">
      
      <div class="flex flex-col md:flex-row justify-between items-center gap-3">
        <div>
          <h2 class="text-lg font-semibold text-slate-800">2. Registros Guardados</h2>
          <p class="text-xs text-slate-500" id="totalCount">Total: 0 personas</p>
        </div>

        <div class="flex items-center gap-2 w-full md:w-auto">
          <input type="text" id="searchFilter" placeholder="Filtrar por DNI o Nombre..." 
            class="w-full md:w-64 px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
          
          <button id="exportBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 px-4 rounded-lg transition text-sm flex items-center gap-2 shrink-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            Exportar Excel
          </button>
        </div>
      </div>

      <!-- Tabla de Datos -->
      <div class="overflow-x-auto border border-slate-200 rounded-lg">
        <table class="w-full text-left text-sm text-slate-600">
          <thead class="bg-slate-50 text-slate-700 border-b border-slate-200">
            <tr>
              <th class="p-3 font-bold">#</th>
              <th class="p-3 font-bold">DNI</th>
              <th class="p-3 font-bold">Nombres</th>
              <th class="p-3 font-bold">Apellidos</th>
              <th class="p-3 font-bold">Fecha Consulta</th>
              <th class="p-3 font-bold text-center">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaResultados" class="divide-y divide-slate-100">
            <!-- Filas dinámicas -->
          </tbody>
        </table>
      </div>

    </div>

  </div>

  <script>
    let baseDatos = [];

    // Referencias DOM
    const dniInput = document.getElementById('dniInput');
    const nombreInput = document.getElementById('nombreInput');
    const apellidoInput = document.getElementById('apellidoInput');
    const btnBuscarDni = document.getElementById('btnBuscarDni');
    const btnAgregar = document.getElementById('btnAgregar');
    const statusAlert = document.getElementById('statusAlert');
    const btnText = document.getElementById('btnText');
    const loader = document.getElementById('loader');

    const dniForm = document.getElementById('dniForm');
    const tablaResultados = document.getElementById('tablaResultados');
    const searchFilter = document.getElementById('searchFilter');
    const exportBtn = document.getElementById('exportBtn');
    const totalCount = document.getElementById('totalCount');

    // API ENDPOINT CONSULTA DNI
    const API_URL = '86b63ed9-3477-4dde-a1d8-87c01013bf0d';

    // 1. Función para consultar el DNI a la API de RENIEC
    async function consultarDNI() {
      const dni = dniInput.value.trim();
      
      if (dni.length !== 8 || isNaN(dni)) {
        mostrarAlerta("Ingresa un número de DNI válido de 8 dígitos.", "error");
        return;
      }

      limpiarAlerta();
      toggleLoading(true);

      try {
        const response = await fetch(`${API_URL}${dni}`);

        if (!response.ok) {
          throw new Error("No se encontraron registros o el servicio superó la cuota gratuita.");
        }

        const data = await response.json();

        if (data.nombres) {
          nombreInput.value = data.nombres;
          apellidoInput.value = `${data.apellidoPaterno || ''} ${data.apellidoMaterno || ''}`.trim();
          
          nombreInput.readOnly = true;
          apellidoInput.readOnly = true;
          btnAgregar.disabled = false;

          mostrarAlerta("¡DNI encontrado con éxito en RENIEC!", "exito");
        } else {
          throw new Error("Respuesta de la API incompleta.");
        }

      } catch (error) {
        console.warn("Fallo en la API:", error);
        mostrarAlerta("No se pudo consultar automáticamente. Se habilitaron los campos para llenado manual.", "advertencia");
        
        // Desbloquea los campos si la API falla o no encuentra datos
        nombreInput.readOnly = false;
        apellidoInput.readOnly = false;
        nombreInput.focus();
        btnAgregar.disabled = false;
      } finally {
        toggleLoading(false);
      }
    }

    // Listener del botón de búsqueda y tecla Enter
    btnBuscarDni.addEventListener('click', consultarDNI);
    dniInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        consultarDNI();
      }
    });

    // 2. Guardar registro en la tabla
    dniForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const dni = dniInput.value.trim();
      const nombres = nombreInput.value.trim();
      const apellidos = apellidoInput.value.trim();

      if (baseDatos.some(p => p.dni === dni)) {
        mostrarAlerta("Este DNI ya se encuentra en la lista.", "error");
        return;
      }

      baseDatos.push({
        dni,
        nombres,
        apellidos,
        fecha: new Date().toLocaleDateString('es-PE') + " " + new Date().toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit' })
      });

      renderTabla(baseDatos);

      // Limpiar formulario
      dniForm.reset();
      nombreInput.readOnly = true;
      apellidoInput.readOnly = true;
      btnAgregar.disabled = true;
      limpiarAlerta();
    });

    // Renderizar la tabla de resultados
    function renderTabla(datos) {
      tablaResultados.innerHTML = '';
      totalCount.textContent = `Total: ${datos.length} personas`;

      if (datos.length === 0) {
        tablaResultados.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-slate-400">No hay registros agregados aún.</td></tr>`;
        return;
      }

      datos.forEach((item, index) => {
        const row = document.createElement('tr');
        row.className = "hover:bg-slate-50 transition border-b border-slate-100";
        row.innerHTML = `
          <td class="p-3 font-mono text-xs text-slate-400">${index + 1}</td>
          <td class="p-3 font-mono font-semibold text-slate-800">${item.dni}</td>
          <td class="p-3 font-medium text-slate-800">${item.nombres}</td>
          <td class="p-3 font-medium text-slate-800">${item.apellidos}</td>
          <td class="p-3 text-xs text-slate-500">${item.fecha}</td>
          <td class="p-3 text-center">
            <button onclick="eliminarRegistro('${item.dni}')" class="text-red-500 hover:text-red-700 font-semibold text-xs transition">Eliminar</button>
          </td>
        `;
        tablaResultados.appendChild(row);
      });
    }

    function eliminarRegistro(dni) {
      baseDatos = baseDatos.filter(p => p.dni !== dni);
      renderTabla(obtenerDatosFiltrados());
    }

    // Filtrar tabla en vivo
    searchFilter.addEventListener('input', () => renderTabla(obtenerDatosFiltrados()));

    function obtenerDatosFiltrados() {
      const query = searchFilter.value.toLowerCase().trim();
      return baseDatos.filter(p => 
        p.dni.toLowerCase().includes(query) || 
        p.nombres.toLowerCase().includes(query) || 
        p.apellidos.toLowerCase().includes(query)
      );
    }

    // 3. Exportar a archivo de Excel (.xlsx)
    exportBtn.addEventListener('click', () => {
      const datosAExportar = obtenerDatosFiltrados();

      if (datosAExportar.length === 0) {
        alert("No hay ningún registro para exportar.");
        return;
      }

      const excelData = datosAExportar.map((item, index) => ({
        "Item": index + 1,
        "DNI": item.dni,
        "Nombres": item.nombres,
        "Apellidos": item.apellidos,
        "Fecha Consulta": item.fecha
      }));

      const worksheet = XLSX.utils.json_to_sheet(excelData);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "Lista RENIEC");

      // Auto-ajustar ancho de columnas
      worksheet['!cols'] = [
        { wch: 6 },
        { wch: 12 },
        { wch: 25 },
        { wch: 25 },
        { wch: 20 }
      ];

      XLSX.writeFile(workbook, `Lista_DNI_RENIEC_${new Date().toISOString().split('T')[0]}.xlsx`);
    });

    // Helpers UI
    function toggleLoading(isLoading) {
      if (isLoading) {
        loader.classList.remove('hidden');
        btnText.textContent = "";
        btnBuscarDni.disabled = true;
      } else {
        loader.classList.add('hidden');
        btnText.textContent = "Buscar";
        btnBuscarDni.disabled = false;
      }
    }

    function mostrarAlerta(mensaje, tipo) {
      statusAlert.textContent = mensaje;
      statusAlert.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'bg-green-50', 'text-green-600', 'bg-amber-50', 'text-amber-700');
      
      if (tipo === 'error') {
        statusAlert.classList.add('bg-red-50', 'text-red-600');
      } else if (tipo === 'exito') {
        statusAlert.classList.add('bg-green-50', 'text-green-600');
      } else if (tipo === 'advertencia') {
        statusAlert.classList.add('bg-amber-50', 'text-amber-700');
      }
    }

    function limpiarAlerta() {
      statusAlert.textContent = "";
      statusAlert.classList.add('hidden');
    }
  </script>
</body>
</html>
